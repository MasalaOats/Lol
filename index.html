
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cricket Player Cards</title>
    <style>
        body {
            font-family: sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: #333;
        }

        #player-cards-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); /* Responsive grid */
            gap: 20px;
            justify-content: center;
        }

        .player-card {
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            text-align: center;
        }

        .player-card img {
            width: 100%;
            max-height: 200px;
            object-fit: cover;
            border-bottom: 1px solid #eee;
            margin-bottom: 15px;
        }

        .player-card h2 {
            margin-top: 0;
            margin-bottom: 10px;
            color: #333;
        }

        .player-card p {
            margin: 5px 0;
            color: #666;
            font-size: 0.9em;
        }

        .player-card .stats {
            display: flex;
            justify-content: space-around;
            width: 100%;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #eee;
        }

        .player-card .stat-item {
            text-align: center;
        }

        .player-card .stat-item strong {
            display: block;
            font-size: 1.1em;
            color: #333;
        }

        .player-card .stat-item span {
            font-size: 0.8em;
            color: #666;
        }
    </style>
</head>
<body>

    <h1>Cricket Legends</h1>

    <div id="player-cards-container">
        <!-- Player cards will be inserted here by the JavaScript -->
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const playerCardsContainer = document.getElementById('player-cards-container');

            // Function to fetch and display player data
            async function displayPlayers() {
                try {
                    // Assuming your JSON file is named 'players.json' and is in the same directory
                    const response = await fetch('players.json');
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    const players = await response.json();

                    players.forEach(player => {
                        const card = document.createElement('div');
                        card.classList.add('player-card');

                        card.innerHTML = `
                            <img src="${player.Card}" alt="${player.Name}">
                            <h2>${player.Name} ${player.Country}</h2>
                            <p><strong>Type:</strong> ${player.Type}</p>
                            <p><strong>Role:</strong> ${player.Role}</p>
                            <p><strong>Style:</strong> ${player.Style}</p>
                            <p><strong>Trait:</strong> ${player.Trait}</p>
                            <div class="stats">
                                <div class="stat-item">
                                    <strong>${player.OVR}</strong>
                                    <span>OVR</span>
                                </div>
                                <div class="stat-item">
                                    <strong>${player.BAT}</strong>
                                    <span>BAT</span>
                                </div>
                                <div class="stat-item">
                                    <strong>${player.BOWL}</strong>
                                    <span>BOWL</span>
                                </div>
                            </div>
                            <p><strong>Price:</strong> ${player.Price.toLocaleString()} </p>
                        `; // .toLocaleString() adds commas to the price

                        playerCardsContainer.appendChild(card);
                    });

                } catch (error) {
                    console.error('Error fetching or parsing player data:', error);
                    playerCardsContainer.innerHTML = '<p>Error loading player data.</p>';
                }
            }

            // Call the function to display players when the page loads
            displayPlayers();
        });
    </script>
</body>
</html>
